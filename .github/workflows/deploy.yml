name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject Firebase Config
        run: |
          sed -i "s/VITE_FIREBASE_API_KEY/${{ secrets.VITE_FIREBASE_API_KEY }}/g" js/firebase-config.js
          sed -i "s/VITE_FIREBASE_AUTH_DOMAIN/${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}/g" js/firebase-config.js
          sed -i "s/VITE_FIREBASE_PROJECT_ID/${{ secrets.VITE_FIREBASE_PROJECT_ID }}/g" js/firebase-config.js
          sed -i "s/VITE_FIREBASE_STORAGE_BUCKET/${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}/g" js/firebase-config.js
          sed -i "s/VITE_FIREBASE_MESSAGING_SENDER_ID/${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}/g" js/firebase-config.js
          sed -i "s/VITE_FIREBASE_APP_ID/${{ secrets.VITE_FIREBASE_APP_ID }}/g" js/firebase-config.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
