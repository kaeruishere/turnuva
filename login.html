<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PES Turnuva — Giriş Yap</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            text-align: center;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
        }
        .login-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="card login-card fade-in">
        <div class="logo login-logo">PES TURNUVA</div>
        <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Efsane turnuvalara katılmak için giriş yap</p>
        
        <button id="btn-login-google" class="btn btn-primary" style="width: 100%; gap: 1rem; padding: 1rem;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" style="width: 20px; background: white; border-radius: 2px; padding: 2px;">
            Google ile Giriş Yap
        </button>
        
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 2rem;">
            Giriş yaparak kullanım koşullarını kabul etmiş olursunuz.
        </p>
    </div>

    <script type="module">
        import { login, observeAuth } from './js/auth.js';
        
        observeAuth((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('btn-login-google').onclick = async () => {
            const user = await login();
            if (user) {
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
