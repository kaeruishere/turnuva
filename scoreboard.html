<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PES Ligi — Scoreboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#03050a;--card:#08101a;--el:#0f1a26;--border:rgba(255,255,255,.07);--border-hi:rgba(255,255,255,.14);--accent:#00e5a0;--accent-dim:rgba(0,229,160,.09);--accent-glow:rgba(0,229,160,.28);--red:#ff4560;--yellow:#ffd230;--blue:#4da6ff;--text:#eef2f7;--text2:#7a8fa3;--text3:#2e3e50;--gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 48px,rgba(255,255,255,.006) 48px,rgba(255,255,255,.006) 49px);pointer-events:none}

    /* TOP BAR */
    .topbar{background:rgba(3,5,10,.97);border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:50;backdrop-filter:blur(20px)}
    .brand{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.12em;color:var(--accent)}
    .brand span{color:var(--text)}
    .live-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:rgba(255,69,96,.13);border:1px solid rgba(255,69,96,.27);color:var(--red);font-size:.72rem;font-weight:700;letter-spacing:.05em}
    .ldot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.3s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
    .topbar-r{display:flex;align-items:center;gap:8px}

    /* PAGE */
    .page{padding:18px 22px 60px;max-width:1100px;margin:0 auto}

    /* SCORE PANEL */
    .score-panel{background:var(--card);border:1px solid var(--border-hi);border-radius:15px;overflow:hidden;margin-bottom:22px;transition:all .3s}
    .sp-header{background:rgba(0,229,160,.07);border-bottom:1px solid var(--border-hi);padding:13px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .sp-title{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.1em;color:var(--accent)}
    .sp-body{padding:22px}

    /* MATCH SELECT */
    .msel{background:var(--el);border:1px solid var(--border-hi);border-radius:9px;padding:9px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.87rem;outline:none;cursor:pointer;max-width:360px;width:100%}
    .msel option{background:var(--el)}
    .msel:focus{border-color:var(--accent)}

    /* LIVE SCORE */
    .live-score{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:20px}
    .ls-team{text-align:center}
    .ls-name{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.06em;line-height:1.1}
    .ls-wrap{display:flex;align-items:center;gap:10px}
    .ls-ctrl{display:flex;flex-direction:column;align-items:center;gap:5px}
    .ls-num{font-family:'Bebas Neue',sans-serif;font-size:5.5rem;line-height:1;min-width:88px;text-align:center;transition:transform .12s}
    .ls-num.bump{transform:scale(1.15)}
    .ls-sep{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--text3)}
    .sbtn{width:42px;height:42px;border-radius:10px;border:none;cursor:pointer;font-size:1.2rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .14s}
    .sbtn-p{background:var(--accent);color:#000}
    .sbtn-p:hover{background:#00ffb3;box-shadow:0 0 16px var(--accent-glow)}
    .sbtn-m{background:var(--el);color:var(--text2);border:1px solid var(--border-hi)}
    .sbtn-m:hover{background:rgba(255,69,96,.13);color:var(--red)}

    /* RED CARDS ROW */
    .rc-row{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;padding:13px;background:var(--el);border-radius:10px;margin-bottom:16px}
    .rc-side{display:flex;align-items:center;gap:7px}
    .rc-side.right{justify-content:flex-end}
    .rc-lbl{font-size:.73rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
    .rc-num{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--red);min-width:28px;text-align:center}
    .rc-sep{font-size:.75rem;color:var(--text3);text-align:center;line-height:1.3}
    .rcbtn{width:30px;height:30px;border-radius:7px;border:none;cursor:pointer;font-size:.85rem;font-weight:700;display:flex;align-items:center;justify-content:center;background:rgba(255,69,96,.13);color:var(--red);transition:all .14s}
    .rcbtn:hover{background:rgba(255,69,96,.27)}

    /* STANDINGS */
    .stand-panel{background:var(--card);border:1px solid var(--border);border-radius:15px;overflow:hidden}
    .stand-header{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .stand-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em}
    .stand-meta{font-size:.8rem;color:var(--text2)}

    /* ROUND GROUP */
    .rg{border-top:1px solid var(--border)}
    .rg-header{padding:10px 20px;background:var(--el);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
    .rg-label{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.1em;color:var(--text2)}

    /* TABLE */
    .stbl{width:100%;border-collapse:collapse}
    .stbl th{font-size:.67rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);padding:10px 14px;text-align:center;border-bottom:1px solid var(--border)}
    .stbl th:nth-child(2){text-align:left}
    .stbl td{padding:13px 14px;text-align:center;border-bottom:1px solid var(--border);font-size:.9rem}
    .stbl td:nth-child(2){text-align:left}
    .stbl tbody tr:last-child td{border-bottom:none}
    .stbl tbody tr:hover{background:var(--el)}
    .rb{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:.74rem;font-weight:700}
    .r1{background:var(--gold);color:#000}.r2{background:var(--silver);color:#000}.r3{background:var(--bronze);color:#000}.r4{background:var(--el);color:var(--text2)}
    .pc{display:flex;align-items:center;gap:9px}
    .av{width:32px;height:32px;border-radius:50%;background:var(--el);border:1px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700;color:var(--accent);flex-shrink:0;text-transform:uppercase}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 14px;border-radius:9px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.83rem;cursor:pointer;border:none;transition:all .14s}
    .btn-primary{background:var(--accent);color:#000}
    .btn-primary:hover{background:#00ffb3}
    .btn-primary:disabled{opacity:.38;cursor:not-allowed}
    .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
    .btn-ghost:hover{color:var(--text);border-color:var(--border-hi)}
    .btn-sm{padding:5px 10px;font-size:.78rem}

    /* BADGE */
    .badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:.67rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
    .b-green{background:rgba(0,229,160,.13);color:var(--accent)}
    .b-gray{background:var(--el);color:var(--text2)}
    .b-yellow{background:rgba(255,210,48,.13);color:var(--yellow)}

    /* FORM DOTS */
    .fb{display:flex;justify-content:center;gap:3px}
    .fw{width:8px;height:8px;border-radius:2px;background:var(--accent)}
    .fd{width:8px;height:8px;border-radius:2px;background:var(--yellow)}
    .fll{width:8px;height:8px;border-radius:2px;background:var(--red)}

    .spin-wrap{display:flex;align-items:center;justify-content:center;padding:40px}
    .spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:_spin .7s linear infinite}
    @keyframes _spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:40px;color:var(--text3)}
    .fl{display:block;font-size:.73rem;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
    .alert{padding:9px 13px;border-radius:9px;font-size:.82rem}
    .a-info{background:rgba(77,166,255,.1);border:1px solid rgba(77,166,255,.27);color:var(--blue)}
    .hidden-panel{display:none!important}

    /* NOW MATCH indicator in standings */
    .now-row{background:rgba(0,229,160,.05)!important;border-left:3px solid var(--accent)}

    @media(max-width:680px){.ls-num{font-size:3.8rem}.ls-name{font-size:1.3rem}.page{padding:12px 14px 40px}}
  </style>
</head>
<body>
<div class="topbar">
  <div class="brand">⚽ <span>PES</span> LİGİ</div>
  <div class="topbar-r">
    <div class="live-badge"><div class="ldot"></div>CANLI</div>
    <button class="btn btn-ghost btn-sm" id="toggle-btn">🎮 Gizle</button>
  </div>
</div>

<div class="page">

  <!-- SCORE PANEL -->
  <div class="score-panel" id="score-panel">
    <div class="sp-header">
      <span class="sp-title">🎮 Şu Anki Maç</span>
      <select class="msel" id="msel">
        <option value="">— Maç Seç —</option>
      </select>
    </div>
    <div class="sp-body">
      <div class="live-score">
        <div class="ls-team">
          <div class="ls-name" id="hname">EV SAHİBİ</div>
        </div>
        <div class="ls-wrap">
          <div class="ls-ctrl">
            <button class="sbtn sbtn-p" id="hp">+</button>
            <div class="ls-num" id="hscore">0</div>
            <button class="sbtn sbtn-m" id="hm">−</button>
          </div>
          <div class="ls-sep">-</div>
          <div class="ls-ctrl">
            <button class="sbtn sbtn-p" id="ap">+</button>
            <div class="ls-num" id="ascore">0</div>
            <button class="sbtn sbtn-m" id="am">−</button>
          </div>
        </div>
        <div class="ls-team">
          <div class="ls-name" id="aname">DEPLASMAn</div>
        </div>
      </div>

      <div class="rc-row">
        <div class="rc-side right">
          <span class="rc-lbl" id="h-rc-lbl">Ev</span>
          <button class="rcbtn" id="hrcp">+🟥</button>
          <span class="rc-num" id="hrc">0</span>
          <button class="rcbtn" id="hrcm">−</button>
        </div>
        <div class="rc-sep">KIRMIZI<br>KARTLAR</div>
        <div class="rc-side">
          <button class="rcbtn" id="arcm">−</button>
          <span class="rc-num" id="arc">0</span>
          <button class="rcbtn" id="arcp">+🟥</button>
          <span class="rc-lbl" id="a-rc-lbl">Deplasman</span>
        </div>
      </div>

      <div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" id="save-btn">💾 Kaydet & Gönder</button>
        <button class="btn btn-ghost" id="reset-btn">🔄 Sıfırla</button>
      </div>
      <div class="alert a-info" style="margin-top:12px;font-size:.77rem;text-align:center">Kaydet'te maç "submitted" olur — oyuncuların 2 onayı gerekecek.</div>
    </div>
  </div>

  <!-- STANDINGS PANEL -->
  <div class="stand-panel">
    <div class="stand-header">
      <h2 class="stand-title">🏆 Lig Tablosu</h2>
      <div class="stand-meta" id="meta">Yükleniyor...</div>
    </div>
    <div id="standings-body"><div class="spin-wrap"><div class="spin"></div></div></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, collection, query, where, onSnapshot, updateDoc, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyCII19pXF_SLL2Tkjw3FeaPxYHNQ_b3J_Q",authDomain:"turnuva-kaeru.firebaseapp.com",projectId:"turnuva-kaeru",storageBucket:"turnuva-kaeru.firebasestorage.app",messagingSenderId:"2078204583",appId:"1:2078204583:web:2c83665f82417e3e843182"};
const db=getFirestore(initializeApp(cfg));
const TID='main';

let tournament=null, matches=[], selMatchId=null;
let hs=0,as=0,hrc=0,arc=0;

// Toggle panel
document.getElementById('toggle-btn').addEventListener('click',()=>{
  const p=document.getElementById('score-panel'),btn=document.getElementById('toggle-btn');
  p.classList.toggle('hidden-panel');
  btn.textContent=p.classList.contains('hidden-panel')?'🎮 Göster':'🎮 Gizle';
});

// Subscribe
onSnapshot(doc(db,'tournaments',TID),s=>{
  tournament=s.exists()?{id:s.id,...s.data()}:null;
  renderStandings();
});
onSnapshot(query(collection(db,'matches'),where('tournamentId','==',TID)),s=>{
  matches=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.slot-b.slot);
  renderStandings();
  populateSelect();
  // Auto-select next pending if nothing selected
  if(!selMatchId){
    const next=matches.find(m=>m.status==='pending');
    if(next){selMatchId=next.id;loadMatch(next);}
  }
});

function populateSelect(){
  const sel=document.getElementById('msel');
  const cur=sel.value;
  const available=matches.filter(m=>m.status==='pending'||m.status==='submitted');
  sel.innerHTML=`<option value="">— Maç Seç —</option>`+
    available.map(m=>`<option value="${m.id}" ${m.id===cur?'selected':''}>
      [${m.round===1?'T1':'T2'} H${m.roundSlot}] ${m.homeName} vs ${m.awayName}${m.status==='submitted'?' ⏳':''}
    </option>`).join('')+
    (!available.length?`<option disabled>Bekleyen maç yok</option>`:'');
}

document.getElementById('msel').addEventListener('change',e=>{
  selMatchId=e.target.value;
  const m=matches.find(x=>x.id===selMatchId);
  if(m)loadMatch(m);
});

function loadMatch(m){
  document.getElementById('hname').textContent=m.homeName.toUpperCase();
  document.getElementById('aname').textContent=m.awayName.toUpperCase();
  document.getElementById('h-rc-lbl').textContent=m.homeName;
  document.getElementById('a-rc-lbl').textContent=m.awayName;
  hs=m.homeGoals??0; as=m.awayGoals??0; hrc=m.homeRedCards??0; arc=m.awayRedCards??0;
  updateDisplay();
}

function bump(id){
  const el=document.getElementById(id);
  el.classList.add('bump');
  setTimeout(()=>el.classList.remove('bump'),130);
}

function updateDisplay(){
  document.getElementById('hscore').textContent=hs;
  document.getElementById('ascore').textContent=as;
  document.getElementById('hrc').textContent=hrc;
  document.getElementById('arc').textContent=arc;
}

document.getElementById('hp').onclick=()=>{hs++;bump('hscore');updateDisplay();};
document.getElementById('hm').onclick=()=>{if(hs>0)hs--;updateDisplay();};
document.getElementById('ap').onclick=()=>{as++;bump('ascore');updateDisplay();};
document.getElementById('am').onclick=()=>{if(as>0)as--;updateDisplay();};
document.getElementById('hrcp').onclick=()=>{hrc++;updateDisplay();};
document.getElementById('hrcm').onclick=()=>{if(hrc>0)hrc--;updateDisplay();};
document.getElementById('arcp').onclick=()=>{arc++;updateDisplay();};
document.getElementById('arcm').onclick=()=>{if(arc>0)arc--;updateDisplay();};
document.getElementById('reset-btn').onclick=()=>{hs=0;as=0;hrc=0;arc=0;updateDisplay();};

document.getElementById('save-btn').addEventListener('click',async()=>{
  if(!selMatchId){alert('Önce maç seç!');return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='Gönderiliyor...';
  try{
    await updateDoc(doc(db,'matches',selMatchId),{
      status:'submitted',homeGoals:hs,awayGoals:as,homeRedCards:hrc,awayRedCards:arc,
      submittedBy:'scoreboard',submittedAt:serverTimestamp(),approvals:[]
    });
    btn.textContent='✅ Gönderildi!';
    setTimeout(()=>{btn.disabled=false;btn.textContent='💾 Kaydet & Gönder';},2200);
  }catch(e){alert(e.message);btn.disabled=false;btn.textContent='💾 Kaydet & Gönder';}
});

// ── STANDINGS ───────────────────────────────────────────────────────────
function calcStandings(){
  if(!tournament?.players)return[];
  const t={};
  tournament.players.forEach(p=>{t[p.uid]={uid:p.uid,username:p.username,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,rc:0,pts:0,form:[]};});
  [...matches].filter(m=>m.status==='confirmed').sort((a,b)=>a.slot-b.slot).forEach(m=>{
    const h=t[m.homeUid],a=t[m.awayUid];if(!h||!a)return;
    h.played++;a.played++;h.gf+=m.homeGoals;h.ga+=m.awayGoals;a.gf+=m.awayGoals;a.ga+=m.homeGoals;
    h.rc+=m.homeRedCards||0;a.rc+=m.awayRedCards||0;
    if(m.homeGoals>m.awayGoals){h.won++;h.pts+=3;a.lost++;h.form.push('W');a.form.push('L');}
    else if(m.awayGoals>m.homeGoals){a.won++;a.pts+=3;h.lost++;h.form.push('L');a.form.push('W');}
    else{h.drawn++;h.pts++;a.drawn++;a.pts++;h.form.push('D');a.form.push('D');}
  });
  return Object.values(t).map(p=>({...p,av:p.gf-p.ga})).sort((a,b)=>b.pts-a.pts||b.av-a.av||b.gf-a.gf);
}

function renderStandings(){
  const body=document.getElementById('standings-body');
  const metaEl=document.getElementById('meta');
  if(!tournament){body.innerHTML=`<div class="empty">Turnuva bulunamadı</div>`;return;}
  const conf=matches.filter(m=>m.status==='confirmed').length;
  const total=matches.length;
  metaEl.textContent=`${tournament.name} · ${conf}/${total} maç tamamlandı`;

  const rows=calcStandings();
  if(!rows.length){body.innerHTML=`<div class="empty">Yükleniyor...</div>`;return;}
  const rc=['r1','r2','r3','r4'];

  // Next match player uids for highlighting
  const next=matches.find(m=>m.status==='submitted'||m.status==='pending');
  const nextUids=next?[next.homeUid,next.awayUid]:[];

  // Split into rounds for fixture display below table
  const r1=matches.filter(m=>m.round===1), r2=matches.filter(m=>m.round===2);
  const d1=r1.filter(m=>m.status==='confirmed').length, d2=r2.filter(m=>m.status==='confirmed').length;

  body.innerHTML=`
  <table class="stbl">
    <thead><tr><th>#</th><th>Oyuncu</th><th>O</th><th>G</th><th>B</th><th>M</th><th>AG</th><th>YG</th><th>AV</th><th>🟥</th><th>Form</th><th>P</th></tr></thead>
    <tbody>
      ${rows.map((p,i)=>{
        const form=(p.form||[]).slice(-5).map(r=>`<div class="${r==='W'?'fw':r==='D'?'fd':'fll'}"></div>`).join('');
        const isNext=nextUids.includes(p.uid);
        return `<tr class="${isNext?'now-row':''}">
          <td><span class="rb ${rc[i]||'r4'}">${i+1}</span></td>
          <td><div class="pc"><div class="av">${p.username[0]}</div><strong>${p.username}</strong></div></td>
          <td>${p.played}</td><td>${p.won}</td><td>${p.drawn}</td><td>${p.lost}</td>
          <td>${p.gf}</td><td>${p.ga}</td>
          <td style="color:${p.av>=0?'var(--accent)':'var(--red)'};font-weight:600">${p.av>0?'+':''}${p.av}</td>
          <td style="color:var(--red)">${p.rc}</td>
          <td><div class="fb">${form}</div></td>
          <td><strong style="color:var(--accent);font-size:1.05rem">${p.pts}</strong></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>
  <div style="padding:10px 16px;font-size:.71rem;color:var(--text3);border-top:1px solid var(--border);text-align:center">
    O=Oyun G=Galibiyet B=Beraberlik M=Mağlubiyet AV=Averaj P=Puan · Yeşil satır = sıradaki maçın oyuncuları
  </div>
  <div class="rg">
    <div class="rg-header">
      <span class="rg-label">1. TUR</span>
      <span class="badge ${d1===6&&r1.length>0?'b-green':'b-gray'}">${d1}/6</span>
    </div>
    ${renderFixtureRows(r1)}
  </div>
  <div class="rg">
    <div class="rg-header">
      <span class="rg-label">2. TUR — RÖVANŞ</span>
      <span class="badge ${d2===6&&r2.length>0?'b-green':'b-gray'}">${d2}/6</span>
    </div>
    ${renderFixtureRows(r2)}
  </div>`;
}

function renderFixtureRows(rmatches){
  if(!rmatches.length)return`<div style="padding:14px 20px;color:var(--text3);font-size:.84rem">Maçlar oluşturulmadı</div>`;
  const next=matches.find(m=>m.status==='submitted'||m.status==='pending');
  let html='';
  // Group by roundSlot
  const slots={};
  rmatches.forEach(m=>{if(!slots[m.roundSlot])slots[m.roundSlot]=[];slots[m.roundSlot].push(m);});
  for(const sl of Object.keys(slots).sort((a,b)=>+a-+b)){
    const pair=slots[sl];
    html+=`<div style="border-bottom:1px solid var(--border);padding:10px 20px">
      <div style="font-size:.7rem;font-weight:700;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px">HAFTA ${sl}</div>
      ${pair.sort((a,b)=>a.slot-b.slot).map(m=>{
        const isN=next?.id===m.id;
        const score=m.status==='confirmed'||m.status==='submitted'?`<strong style="font-family:'Bebas Neue',sans-serif;font-size:1.15rem">${m.homeGoals} - ${m.awayGoals}</strong>`:`<span style="color:var(--text3);font-size:.82rem;font-family:'Bebas Neue',sans-serif;letter-spacing:.1em">VS</span>`;
        const badge=m.status==='confirmed'?`<span class="badge b-green">✓</span>`:
          m.status==='submitted'?`<span class="badge b-yellow">⏳</span>`:
          isN?`<span class="badge" style="background:rgba(0,229,160,.13);color:var(--accent)">▶</span>`:'';
        return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;${isN?'background:rgba(0,229,160,.04);border-radius:7px;padding:5px 7px;':''}">
          <span style="flex:1;text-align:right;font-size:.87rem;font-weight:${isN?'700':'400'}">${m.homeName}</span>
          ${score}
          <span style="flex:1;font-size:.87rem;font-weight:${isN?'700':'400'}">${m.awayName}</span>
          ${badge}
        </div>`;
      }).join('')}
    </div>`;
  }
  return html;
}
</script>
</body>
</html>
