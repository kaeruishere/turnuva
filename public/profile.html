<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PES Turnuva — Profilim</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .profile-container { text-align: center; }
        .avatar-preview { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--primary); margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 3rem; background: var(--card-bg); overflow: hidden; }
        .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; margin-top: 1rem; }
        .emoji-btn { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 0.8rem; font-size: 1.5rem; cursor: pointer; transition: var(--transition); }
        .emoji-btn:hover, .emoji-btn.active { border-color: var(--primary); background: rgba(0,255,136,0.1); }
        .danger-zone { border-top: 1px solid var(--border-color); margin-top: 3rem; padding-top: 2rem; }
    </style>
</head>
<body>
    <nav class="app-bar">
        <a href="index.html" style="text-decoration: none; color: var(--text-main); font-size: 1.2rem;">←</a>
        <div class="card-header">PROFİL AYARLARI</div>
        <div style="width: 36px;"></div>
    </nav>

    <div class="container">
        <div class="profile-container">
            <div id="avatar-display" class="avatar-preview">
                <!-- Emoji or Image -->
            </div>

            <div class="card">
                <form id="form-profile">
                    <label style="display: block; margin-bottom: 0.5rem; font-size: 0.8rem; text-align: left;">Kullanıcı Adı / Nickname</label>
                    <input type="text" id="profile-nickname" placeholder="Nickname giriniz..." required>

                    <label style="display: block; margin-bottom: 0.5rem; font-size: 0.8rem; text-align: left;">Emoji Profil Resmi Seç</label>
                    <div class="emoji-grid" id="emoji-grid">
                        <button type="button" class="emoji-btn" data-emoji="⚽">⚽</button>
                        <button type="button" class="emoji-btn" data-emoji="🏆">🏆</button>
                        <button type="button" class="emoji-btn" data-emoji="🔥">🔥</button>
                        <button type="button" class="emoji-btn" data-emoji="⚡">⚡</button>
                        <button type="button" class="emoji-btn" data-emoji="🎮">🎮</button>
                        <button type="button" class="emoji-btn" data-emoji="🦁">🦁</button>
                        <button type="button" class="emoji-btn" data-emoji="🦅">🦅</button>
                        <button type="button" class="emoji-btn" data-emoji="🐺">🐺</button>
                        <button type="button" class="emoji-btn" data-emoji="💪">💪</button>
                        <button type="button" class="emoji-btn" data-emoji="👑">👑</button>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">Değişiklikleri Kaydet</button>
                </form>
            </div>

            <div class="card" style="text-align: left;">
                <h3 style="font-size: 0.9rem; margin-bottom: 1rem;">Hesap Bilgileri</h3>
                <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">E-posta: <span id="display-email" style="color: var(--text-main);">...</span></div>
                <div style="font-size: 0.85rem; color: var(--text-muted);">Üyelik: <span style="color: var(--text-main);">Google Hesabı</span></div>
            </div>

            <div class="danger-zone">
                <button id="btn-logout-profile" class="btn btn-secondary" style="width: 100%; margin-bottom: 1rem;">Oturumu Kapat</button>
                <button id="btn-delete-account" class="btn btn-secondary" style="width: 100%; color: var(--accent); border-color: rgba(255,0,85,0.2);">Hesabımı Kalıcı Olarak Sil</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/profile-main.js"></script>
</body>
</html>
