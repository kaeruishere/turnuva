<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PES Ligi</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #06080d;
      --bg-card: #0c1018;
      --bg-el: #111822;
      --bg-hover: #16202e;
      --border: rgba(255,255,255,0.06);
      --border-hi: rgba(255,255,255,0.12);
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.1);
      --accent-glow: rgba(0,229,160,0.25);
      --red: #ff4560;
      --yellow: #ffd230;
      --blue: #4da6ff;
      --text: #eef2f7;
      --text-2: #7a8fa3;
      --text-3: #38495a;
      --gold: #ffd700;
      --silver: #c0c0c0;
      --bronze: #cd7f32;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 44px,rgba(255,255,255,0.007) 44px,rgba(255,255,255,0.007) 45px);pointer-events:none;z-index:0}
    #app{position:relative;z-index:1;min-height:100vh}
    h1,h2,h3,.display{font-family:'Bebas Neue',sans-serif;letter-spacing:.06em}

    /* NAV */
    .nav{background:rgba(6,8,13,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:56px}
    .nav-brand{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.12em;color:var(--accent);text-decoration:none;cursor:pointer;display:flex;align-items:center;gap:6px}
    .nav-brand span{color:var(--text)}
    .nav-right{display:flex;align-items:center;gap:10px}
    .nav-user{font-size:.82rem;color:var(--text-2);font-weight:600}

    /* MAIN */
    .main{padding:24px 16px 80px;max-width:900px;margin:0 auto;width:100%}

    /* AUTH */
    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .auth-glow{position:fixed;top:15%;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(0,229,160,0.05) 0%,transparent 70%);pointer-events:none}
    .auth-inner{width:100%;max-width:360px}
    .auth-brand{text-align:center;margin-bottom:32px}
    .auth-icon{font-size:2rem;width:60px;height:60px;background:var(--accent-dim);border:1px solid var(--accent-glow);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}

    /* CARD */
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .card-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .card-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.08em}
    .card-body{padding:20px}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:9px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.875rem;cursor:pointer;border:none;transition:all .15s;text-decoration:none;white-space:nowrap}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:var(--accent);color:#000}
    .btn-primary:hover:not(:disabled){background:#00ffb3;box-shadow:0 0 24px var(--accent-glow)}
    .btn-secondary{background:var(--bg-el);color:var(--text);border:1px solid var(--border-hi)}
    .btn-secondary:hover:not(:disabled){background:var(--bg-hover)}
    .btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
    .btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--border-hi)}
    .btn-danger{background:rgba(255,69,96,.14);color:var(--red);border:1px solid rgba(255,69,96,.28)}
    .btn-danger:hover:not(:disabled){background:rgba(255,69,96,.24)}
    .btn-sm{padding:5px 11px;font-size:.78rem}
    .btn-lg{padding:13px 28px;font-size:1rem}
    .btn-full{width:100%}

    /* FORM */
    .fg{margin-bottom:16px}
    .fl{display:block;font-size:.77rem;font-weight:700;color:var(--text-2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
    .fi{width:100%;background:var(--bg-el);border:1px solid var(--border-hi);border-radius:9px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
    .fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,160,.1)}
    .fi::placeholder{color:var(--text-3)}
    select.fi{cursor:pointer}
    select.fi option{background:var(--bg-el);color:var(--text)}

    /* BADGE */
    .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .b-green{background:rgba(0,229,160,.14);color:var(--accent)}
    .b-red{background:rgba(255,69,96,.14);color:var(--red)}
    .b-yellow{background:rgba(255,210,48,.14);color:var(--yellow)}
    .b-blue{background:rgba(77,166,255,.14);color:var(--blue)}
    .b-gray{background:var(--bg-el);color:var(--text-2)}

    /* TABS */
    .tabs{display:flex;gap:3px;background:var(--bg-el);border-radius:11px;padding:4px}
    .tab{flex:1;padding:8px 6px;text-align:center;font-size:.78rem;font-weight:600;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--text-3);border:none;background:none;letter-spacing:.04em;font-family:'DM Sans',sans-serif}
    .tab.active{background:var(--bg-card);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.4)}

    /* STANDINGS TABLE */
    .stbl{width:100%;border-collapse:collapse}
    .stbl th{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);padding:10px 10px;text-align:center;border-bottom:1px solid var(--border)}
    .stbl th:first-child{text-align:left}
    .stbl td{padding:11px 10px;text-align:center;border-bottom:1px solid var(--border);font-size:.88rem}
    .stbl td:first-child{text-align:left}
    .stbl tbody tr:hover{background:var(--bg-el)}
    .stbl tbody tr:last-child td{border-bottom:none}
    .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:.74rem;font-weight:700}
    .r1{background:var(--gold);color:#000}
    .r2{background:var(--silver);color:#000}
    .r3{background:var(--bronze);color:#000}
    .r4{background:var(--bg-el);color:var(--text-2)}
    .p-cell{display:flex;align-items:center;gap:9px}
    .avatar{width:30px;height:30px;border-radius:50%;background:var(--bg-el);border:1px solid var(--border-hi);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--accent);flex-shrink:0;text-transform:uppercase}

    /* MATCH CARD */
    .match-card{background:var(--bg-card);border:1px solid var(--border);border-radius:11px;padding:13px 15px;margin-bottom:8px;transition:border-color .15s}
    .match-card:hover{border-color:var(--border-hi)}
    .match-row{display:flex;align-items:center;gap:8px}
    .match-team{flex:1;text-align:center}
    .match-name{font-weight:600;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .match-score{display:flex;align-items:center;gap:4px;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;min-width:80px;justify-content:center}
    .score-sep{color:var(--text-3);font-size:1.2rem}
    .match-vs{font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--text-3);letter-spacing:.1em;min-width:80px;text-align:center}
    .match-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .red-cards-row{display:flex;gap:8px;justify-content:center;margin-top:6px;font-size:.75rem;color:var(--text-2)}

    /* TOURNAMENT LIST */
    .t-item{background:var(--bg-card);border:1px solid var(--border);border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:8px}
    .t-item:hover{border-color:var(--border-hi);background:var(--bg-el)}
    .t-icon{width:42px;height:42px;background:var(--accent-dim);border:1px solid var(--accent-glow);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.2rem}
    .t-info{flex:1;min-width:0}
    .t-name{font-weight:700;font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* MODAL */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease}
    .overlay.hidden{display:none}
    @media(min-width:600px){.overlay{align-items:center;padding:20px}}
    .modal{background:var(--bg-card);border:1px solid var(--border-hi);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:460px;animation:slideUp .2s ease;max-height:90vh;overflow-y:auto}
    @media(min-width:600px){.modal{border-radius:18px}}
    .modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.08em;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}

    /* STAT */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
    .stat-box{background:var(--bg-el);border:1px solid var(--border);border-radius:11px;padding:14px 12px;text-align:center}
    .stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;color:var(--accent);line-height:1}
    .stat-lbl{font-size:.67rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);margin-top:4px}

    /* MISC */
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .section-title::after{content:'';flex:1;height:1px;background:var(--border)}
    .empty{text-align:center;padding:48px 20px;color:var(--text-3)}
    .empty-icon{font-size:2.5rem;margin-bottom:12px}
    .empty p{font-size:.9rem}
    .alert{padding:11px 15px;border-radius:9px;font-size:.86rem;margin-bottom:14px}
    .a-error{background:rgba(255,69,96,.1);border:1px solid rgba(255,69,96,.28);color:var(--red)}
    .a-success{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.28);color:var(--accent)}
    .a-info{background:rgba(77,166,255,.1);border:1px solid rgba(77,166,255,.28);color:var(--blue)}
    .a-warn{background:rgba(255,210,48,.1);border:1px solid rgba(255,210,48,.28);color:var(--yellow)}
    .spinner-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .gap-8{gap:8px}
    .hidden{display:none!important}
    .text-accent{color:var(--accent)}
    .text-muted{color:var(--text-2)}
    .text-sm{font-size:.85rem}
    .text-center{text-align:center}
    .mt-8{margin-top:8px}
    .mt-12{margin-top:12px}
    .mb-8{margin-bottom:8px}
    .mb-12{margin-bottom:12px}
    .mb-16{margin-bottom:16px}
    .mb-20{margin-bottom:20px}

    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}

    /* pending-approval highlight */
    .match-card.needs-action{border-color:rgba(255,210,48,.35);background:rgba(255,210,48,.04)}
    .approval-bar{display:flex;gap:4px;margin-top:8px;justify-content:center}
    .apv-dot{width:8px;height:8px;border-radius:50%;background:var(--bg-el);border:1px solid var(--border-hi)}
    .apv-dot.approved{background:var(--accent)}

    /* username change */
    .inline-edit{display:flex;align-items:center;gap:8px}
    .inline-edit .fi{flex:1}

    /* form-check */
    .fcheck{display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:8px}
    .fcheck input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
    .fcheck span{font-size:.8rem;color:var(--text-2)}
  </style>
</head>
<body>
<div id="app"><div class="spinner-wrap"><div class="spinner"></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc,
  collection, query, where, serverTimestamp, onSnapshot, writeBatch
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── FIREBASE ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCII19pXF_SLL2Tkjw3FeaPxYHNQ_b3J_Q",
  authDomain: "turnuva-kaeru.firebaseapp.com",
  projectId: "turnuva-kaeru",
  storageBucket: "turnuva-kaeru.firebasestorage.app",
  messagingSenderId: "2078204583",
  appId: "1:2078204583:web:2c83665f82417e3e843182"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentUser = null;
let userProfile = null;
let currentTournament = null;
let currentMatches = [];
let currentPage = 'home'; // home | tournament
let currentTab = 'standings';
let unsubMatches = null;
let unsubTournament = null;

// ── ROUTER ────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) {
    const snap = await getDoc(doc(db, 'users', user.uid));
    userProfile = snap.exists() ? snap.data() : null;
  }
  renderApp();
});

function renderApp() {
  const app = document.getElementById('app');
  if (!currentUser) { app.innerHTML = renderAuth(); bindAuth(); return; }
  if (currentPage === 'home') { app.innerHTML = renderLayout(renderHome()); bindHome(); return; }
  if (currentPage === 'tournament') { app.innerHTML = renderLayout(renderTournamentShell()); bindNav(); subscribeTournament(); return; }
}

function renderLayout(content) {
  const uname = userProfile?.username || currentUser?.displayName || 'Oyuncu';
  return `
    <nav class="nav">
      <a class="nav-brand" id="go-home">⚽ <span>PES</span> LİGİ</a>
      <div class="nav-right">
        <span class="nav-user">${uname}</span>
        <button class="btn btn-ghost btn-sm" id="change-name-btn">✏️ Ad</button>
        <button class="btn btn-ghost btn-sm" id="logout-btn">Çıkış</button>
      </div>
    </nav>
    <main class="main" id="main-content">${content}</main>
  `;
}

function bindNav() {
  document.getElementById('go-home')?.addEventListener('click', () => {
    cleanupListeners();
    currentPage = 'home'; currentTournament = null;
    currentMatches = []; renderApp();
  });
  document.getElementById('logout-btn')?.addEventListener('click', () => { cleanupListeners(); signOut(auth); });
  document.getElementById('change-name-btn')?.addEventListener('click', showChangeNameModal);
}

function cleanupListeners() {
  if (unsubMatches) { unsubMatches(); unsubMatches = null; }
  if (unsubTournament) { unsubTournament(); unsubTournament = null; }
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
// We use username@pes.local as the "email" internally — users never see this
function renderAuth() {
  return `
  <div class="auth-wrap">
    <div class="auth-glow"></div>
    <div class="auth-inner">
      <div class="auth-brand">
        <div class="auth-icon">🏆</div>
        <h1 class="display" style="font-size:2.4rem">PES <span class="text-accent">LİGİ</span></h1>
        <p class="text-muted text-sm" style="margin-top:6px">Kanka turnuvası</p>
      </div>
      <div class="card">
        <div style="padding:24px">
          <div id="auth-error"></div>
          <div class="fg">
            <label class="fl">Kullanıcı Adı</label>
            <input class="fi" id="f-user" placeholder="mesela: kaeru" autocomplete="username" />
          </div>
          <div class="fg" style="margin-bottom:20px">
            <label class="fl">Şifre</label>
            <input class="fi" id="f-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button class="btn btn-primary btn-full btn-lg" id="auth-submit">Giriş Yap</button>
          <p class="text-muted text-sm text-center" style="margin-top:14px">Hesabın yoksa otomatik oluşturulur</p>
        </div>
      </div>
    </div>
  </div>`;
}

function bindAuth() {
  document.getElementById('auth-submit').addEventListener('click', async () => {
    const errEl = document.getElementById('auth-error');
    errEl.innerHTML = '';
    const username = document.getElementById('f-user').value.trim().toLowerCase();
    const password = document.getElementById('f-pass').value;
    const btn = document.getElementById('auth-submit');
    if (!username) { errEl.innerHTML = `<div class="alert a-error">Kullanıcı adı gir</div>`; return; }
    if (!password) { errEl.innerHTML = `<div class="alert a-error">Şifre gir</div>`; return; }
    const fakeEmail = `${username}@pes.local`;
    btn.disabled = true; btn.textContent = 'Bekle...';
    try {
      // Try login first
      try {
        await signInWithEmailAndPassword(auth, fakeEmail, password);
      } catch (loginErr) {
        if (loginErr.code === 'auth/user-not-found' || loginErr.code === 'auth/invalid-credential' || loginErr.code === 'auth/invalid-email') {
          // Register
          const res = await createUserWithEmailAndPassword(auth, fakeEmail, password);
          await updateProfile(res.user, { displayName: username });
          await setDoc(doc(db, 'users', res.user.uid), { uid: res.user.uid, username, createdAt: new Date() });
        } else {
          throw loginErr;
        }
      }
    } catch(err) {
      const msgs = {
        'auth/wrong-password': 'Şifre yanlış',
        'auth/weak-password': 'Şifre en az 6 karakter olmalı',
        'auth/too-many-requests': 'Çok fazla deneme, biraz bekle',
      };
      errEl.innerHTML = `<div class="alert a-error">${msgs[err.code] || err.message || 'Hata oluştu'}</div>`;
      btn.disabled = false; btn.textContent = 'Giriş Yap';
    }
  });
  document.getElementById('f-pass').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('auth-submit').click(); });
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome() {
  return `
  <div id="home-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 class="display" style="font-size:1.8rem">Turnuvalar</h2>
      <button class="btn btn-primary" id="new-tournament-btn">+ Yeni Turnuva</button>
    </div>
    <div id="tournament-list"><div class="spinner-wrap" style="min-height:200px"><div class="spinner"></div></div></div>
  </div>`;
}

async function bindHome() {
  bindNav();
  document.getElementById('new-tournament-btn').addEventListener('click', showNewTournamentModal);
  await loadTournamentList();
}

async function loadTournamentList() {
  const listEl = document.getElementById('tournament-list');
  if (!listEl) return;
  try {
    const snap = await getDocs(collection(db, 'tournaments'));
    const all = snap.docs.map(d => ({id:d.id,...d.data()}))
      .sort((a,b) => (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    if (!all.length) {
      listEl.innerHTML = `<div class="empty"><div class="empty-icon">🏆</div><p>Henüz turnuva yok. İlk turnuvayı başlat!</p></div>`;
      return;
    }
    listEl.innerHTML = all.map(t => {
      const statusLabel = t.status === 'waiting' ? `<span class="badge b-yellow">Bekleniyor</span>` :
        t.status === 'active' ? `<span class="badge b-green">Aktif</span>` :
        `<span class="badge b-gray">Bitti</span>`;
      const dt = t.createdAt?.seconds ? new Date(t.createdAt.seconds*1000).toLocaleDateString('tr-TR') : '';
      return `<div class="t-item" data-id="${t.id}">
        <div class="t-icon">🏆</div>
        <div class="t-info">
          <div class="t-name">${t.name} ${statusLabel}</div>
          <div class="text-muted text-sm">${t.players?.length||0} oyuncu · ${dt}</div>
        </div>
        <span style="color:var(--text-3);font-size:1.2rem">›</span>
      </div>`;
    }).join('');
    listEl.querySelectorAll('.t-item').forEach(el => {
      el.addEventListener('click', () => openTournament(el.dataset.id));
    });
  } catch(e) {
    listEl.innerHTML = `<div class="alert a-error">Yüklenemedi: ${e.message}</div>`;
  }
}

async function openTournament(id) {
  try {
    const snap = await getDoc(doc(db,'tournaments',id));
    if (!snap.exists()) { alert('Turnuva bulunamadı'); return; }
    currentTournament = {id:snap.id,...snap.data()};
    currentPage = 'tournament';
    currentTab = 'standings';
    renderApp();
  } catch(e) { alert(e.message); }
}

function subscribeTournament() {
  if (!currentTournament) return;

  // Listen tournament doc
  unsubTournament = onSnapshot(doc(db,'tournaments',currentTournament.id), snap => {
    if (snap.exists()) currentTournament = {id:snap.id,...snap.data()};
    renderTournamentContent();
  });

  // Listen matches
  const q = query(collection(db,'matches'), where('tournamentId','==',currentTournament.id));
  unsubMatches = onSnapshot(q, snap => {
    currentMatches = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderTournamentContent();
  });

  // Tab clicks
  document.getElementById('t-tabs')?.addEventListener('click', e => {
    const t = e.target.closest('.tab');
    if (!t) return;
    currentTab = t.dataset.tab;
    document.querySelectorAll('#t-tabs .tab').forEach(b => b.classList.toggle('active', b===t));
    renderTournamentContent();
  });
}

function renderTournamentContent() {
  const titleEl = document.getElementById('t-title');
  const subEl = document.getElementById('t-subtitle');
  const bodyEl = document.getElementById('t-body');
  if (!titleEl||!bodyEl) return;
  if (currentTournament) {
    titleEl.textContent = currentTournament.name;
    const confirmed = currentMatches.filter(m=>m.status==='confirmed').length;
    const total = currentMatches.length;
    subEl.textContent = `${confirmed}/${total} maç tamamlandı`;
  }
  if (currentTab==='standings') bodyEl.innerHTML = renderStandings();
  else if (currentTab==='fixtures') { bodyEl.innerHTML = renderFixtures(); bindFixtures(); }
  else if (currentTab==='stats') bodyEl.innerHTML = renderStats();
}

// ── FIXTURES ──────────────────────────────────────────────────────────────────
function renderFixtures() {
  if (!currentMatches.length) return `<div class="empty"><div class="empty-icon">📅</div><p>Henüz maç yok</p></div>`;
  
  // Group by round pairs
  const pending = currentMatches.filter(m=>m.status==='pending');
  const submitted = currentMatches.filter(m=>m.status==='submitted');
  const disputed = currentMatches.filter(m=>m.status==='disputed');
  const confirmed = currentMatches.filter(m=>m.status==='confirmed');

  let html = '';
  if (submitted.length||disputed.length) {
    html += `<h3 class="section-title">⚠️ Onay Bekliyor</h3>`;
    html += [...submitted,...disputed].map(m => renderMatchCard(m, true)).join('');
  }
  if (pending.length) {
    html += `<h3 class="section-title">📅 Oynanacak Maçlar</h3>`;
    html += pending.map(m => renderMatchCard(m, false)).join('');
  }
  if (confirmed.length) {
    html += `<h3 class="section-title">✅ Tamamlanan Maçlar</h3>`;
    html += confirmed.map(m => renderMatchCard(m, false)).join('');
  }
  return html;
}

function renderMatchCard(m, highlight) {
  const myUid = currentUser.uid;
  const players = currentTournament?.players || [];
  const totalPlayers = players.length;
  const isSubmitter = m.submittedBy === myUid;
  const alreadyApproved = m.approvals?.includes(myUid);
  const approvalCount = m.approvals?.length || 0;
  const needed = 2; // need 2 approvals total

  let scoreHtml = '';
  if (m.status === 'confirmed' || m.status === 'submitted' || m.status === 'disputed') {
    const hg = m.homeGoals ?? '-';
    const ag = m.awayGoals ?? '-';
    scoreHtml = `<div class="match-score">${hg}<span class="score-sep">-</span>${ag}</div>`;
  } else {
    scoreHtml = `<div class="match-vs">VS</div>`;
  }

  let actionsHtml = '';
  if (m.status === 'pending') {
    actionsHtml = `
      <div class="match-actions">
        <button class="btn btn-primary btn-sm" data-action="score" data-id="${m.id}">Skor Gir</button>
      </div>`;
  } else if (m.status === 'submitted' || m.status === 'disputed') {
    // Approval dots
    const dots = Array(totalPlayers).fill(0).map((_,i) => {
      const approved = m.approvals?.includes(players[i]?.uid);
      return `<div class="apv-dot ${approved?'approved':''}" title="${players[i]?.username||'?'}"></div>`;
    }).join('');
    actionsHtml = `
      <div class="match-actions" style="flex-direction:column;gap:8px">
        <div style="font-size:.75rem;color:var(--text-2);text-align:center">${approvalCount}/${needed} onay</div>
        <div class="approval-bar">${dots}</div>
        <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
          ${!alreadyApproved ? `<button class="btn btn-primary btn-sm" data-action="approve" data-id="${m.id}">✓ Onayla</button>` : `<span class="badge b-green">Onayladın ✓</span>`}
          <button class="btn btn-danger btn-sm" data-action="dispute" data-id="${m.id}">⚠️ İtiraz</button>
          <button class="btn btn-secondary btn-sm" data-action="edit" data-id="${m.id}">Düzenle</button>
        </div>
      </div>`;
  }

  const redCardsRow = (m.status==='confirmed'||m.status==='submitted') && (m.homeRedCards||m.awayRedCards) ? `
    <div class="red-cards-row">
      <span>🟥 ${m.homeName}: ${m.homeRedCards}</span>
      <span>🟥 ${m.awayName}: ${m.awayRedCards}</span>
    </div>` : '';

  const statusBadge = m.status==='confirmed' ? `<span class="badge b-green">Onaylandı</span>` :
    m.status==='submitted' ? `<span class="badge b-yellow">Onay Bekliyor</span>` :
    m.status==='disputed' ? `<span class="badge b-red">İtiraz</span>` : '';

  return `
  <div class="match-card ${highlight?'needs-action':''}" data-mid="${m.id}">
    <div class="match-row">
      <div class="match-team"><div class="match-name">${m.homeName}</div></div>
      ${scoreHtml}
      <div class="match-team"><div class="match-name">${m.awayName}</div></div>
    </div>
    ${redCardsRow}
    ${statusBadge ? `<div style="text-align:center;margin-top:8px">${statusBadge}</div>` : ''}
    ${actionsHtml}
  </div>`;
}

function bindFixtures() {
  document.getElementById('t-body')?.addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const id = btn.dataset.id;
    const match = currentMatches.find(m=>m.id===id);
    if (!match) return;
    if (action==='score'||action==='edit') showScoreModal(match);
    if (action==='approve') await doApprove(match);
    if (action==='dispute') await doDispute(match);
  });
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats() {
  if (!currentTournament?.players) return `<div class="empty"><p>Yükleniyor...</p></div>`;
  const confirmed = currentMatches.filter(m=>m.status==='confirmed');
  const players = currentTournament.players;

  // Per-player stats
  const stats = {};
  players.forEach(p => {
    stats[p.uid] = {username:p.username, goals:0, redCards:0, wins:0, draws:0, losses:0, matches:0, cleanSheets:0};
  });
  confirmed.forEach(m => {
    const h = stats[m.homeUid], a = stats[m.awayUid];
    if (!h||!a) return;
    h.goals += m.homeGoals; a.goals += m.awayGoals;
    h.redCards += m.homeRedCards; a.redCards += m.awayRedCards;
    h.matches++; a.matches++;
    if (m.homeGoals > m.awayGoals) { h.wins++; a.losses++; }
    else if (m.awayGoals > m.homeGoals) { a.wins++; h.losses++; }
    else { h.draws++; a.draws++; }
    if (m.awayGoals===0) h.cleanSheets++;
    if (m.homeGoals===0) a.cleanSheets++;
  });

  const rows = Object.values(stats).sort((a,b)=>b.goals-a.goals);
  const topScorer = rows[0];
  const mostRed = [...rows].sort((a,b)=>b.redCards-a.redCards)[0];

  return `
  <div class="stat-grid mb-16">
    <div class="stat-box"><div class="stat-val">${confirmed.length}</div><div class="stat-lbl">Tamamlanan Maç</div></div>
    <div class="stat-box"><div class="stat-val">${confirmed.reduce((s,m)=>s+m.homeGoals+m.awayGoals,0)}</div><div class="stat-lbl">Toplam Gol</div></div>
    <div class="stat-box"><div class="stat-val">${confirmed.reduce((s,m)=>s+m.homeRedCards+m.awayRedCards,0)}</div><div class="stat-lbl">Toplam Kırmızı Kart</div></div>
    <div class="stat-box"><div class="stat-val">${confirmed.length ? (confirmed.reduce((s,m)=>s+m.homeGoals+m.awayGoals,0)/confirmed.length).toFixed(1) : '0'}</div><div class="stat-lbl">Maç Başı Gol</div></div>
  </div>

  <h3 class="section-title">⚽ Oyuncu İstatistikleri</h3>
  <div class="card mb-16">
    <table class="stbl">
      <thead>
        <tr><th style="text-align:left">Oyuncu</th><th>Maç</th><th>Gol</th><th>G/Maç</th><th>🟥</th><th>Galibiyet</th><th>Temiz Kale</th></tr>
      </thead>
      <tbody>
        ${rows.map(p => `
          <tr>
            <td><div class="p-cell"><div class="avatar">${p.username[0]}</div>${p.username}</div></td>
            <td>${p.matches}</td>
            <td style="color:var(--accent);font-weight:700">${p.goals}</td>
            <td>${p.matches?((p.goals/p.matches).toFixed(1)):'0'}</td>
            <td style="color:var(--red)">${p.redCards}</td>
            <td>${p.wins}</td>
            <td>${p.cleanSheets}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>

  ${topScorer ? `
  <h3 class="section-title">🏅 Liderler</h3>
  <div class="stat-grid">
    <div class="stat-box"><div class="stat-val">${topScorer.username[0]}</div><div class="stat-lbl">Top Scorer: ${topScorer.username} (${topScorer.goals})</div></div>
    <div class="stat-box"><div class="stat-val">${mostRed?.username[0]||'-'}</div><div class="stat-lbl">En Fazla Kırmızı: ${mostRed?.username||'-'} (${mostRed?.redCards||0})</div></div>
  </div>` : ''}`;
}

// ── APPROVE / DISPUTE ─────────────────────────────────────────────────────────
async function doApprove(match) {
  const uid = currentUser.uid;
  const currentApprovals = match.approvals || [];
  if (currentApprovals.includes(uid)) return;
  const newApprovals = [...currentApprovals, uid];
  const needed = 2;
  const newStatus = newApprovals.length >= needed ? 'confirmed' : 'submitted';
  try {
    await updateDoc(doc(db,'matches',match.id), {
      approvals: newApprovals,
      status: newStatus,
      ...(newStatus==='confirmed' ? {confirmedAt:serverTimestamp()} : {})
    });
  } catch(e) { alert(e.message); }
}

async function doDispute(match) {
  if (!confirm('İtiraz ediliyor. Skor silinecek ve tekrar girilmesi gerekecek. Devam?')) return;
  try {
    await updateDoc(doc(db,'matches',match.id), {
      status:'pending', homeGoals:null, awayGoals:null,
      homeRedCards:0, awayRedCards:0,
      submittedBy:null, approvals:[], submittedAt:null
    });
  } catch(e) { alert(e.message); }
}

      await updateProfile(currentUser, {displayName: newname});
      await updateDoc(doc(db,'users',currentUser.uid), {username: newname});
      userProfile = {...(userProfile||{}), username: newname};
      overlay.classList.add('hidden');
      // Re-render nav
      document.querySelector('.nav-user').textContent = newname;
    } catch(e) {
      errEl.innerHTML=`<div class="alert a-error">${e.message}</div>`;
      btn.disabled=false; btn.textContent='Kaydet';
    }
  });
}

// ── CALC STANDINGS ────────────────────────────────────────────────────────────
function calcStandings(players, matches) {
  const t = {};
  players.forEach(p => {
    t[p.uid] = {uid:p.uid,username:p.username,played:0,won:0,drawn:0,lost:0,goalsFor:0,goalsAgainst:0,redCards:0,points:0};
  });
  matches.filter(m=>m.status==='confirmed').forEach(m => {
    const h=t[m.homeUid], a=t[m.awayUid];
    if(!h||!a) return;
    const hg=m.homeGoals, ag=m.awayGoals;
    h.played++; a.played++;
    h.goalsFor+=hg; h.goalsAgainst+=ag;
    a.goalsFor+=ag; a.goalsAgainst+=hg;
    h.redCards+=m.homeRedCards||0; a.redCards+=m.awayRedCards||0;
    if(hg>ag){h.won++;h.points+=3;a.lost++;}
    else if(ag>hg){a.won++;a.points+=3;h.lost++;}
    else{h.drawn++;h.points++;a.drawn++;a.points++;}
  });
  return Object.values(t)
    .map(p=>({...p,goalDiff:p.goalsFor-p.goalsAgainst}))
    .sort((a,b)=>b.points-a.points||b.goalDiff-a.goalDiff||b.goalsFor-a.goalsFor);
}
